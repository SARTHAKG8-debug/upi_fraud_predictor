<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Fraud Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 400px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #666; font-weight: bold; }
        input[type="number"], input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 20px; padding: 15px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 18px; }
        .fraud { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .safe { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UPI Fraud Predictor</h1>
        <form action="/predict" method="POST">
            <label for="trans_hour">Transaction Hour (0-23):</label>
            <input type="number" id="trans_hour" name="trans_hour" required min="0" max="23">

            <label for="trans_day">Transaction Day (1-31):</label>
            <input type="number" id="trans_day" name="trans_day" required min="1" max="31">

            <label for="trans_month">Transaction Month (1-12):</label>
            <input type="number" id="trans_month" name="trans_month" required min="1" max="12">

            <label for="trans_year">Transaction Year:</label>
            <input type="number" id="trans_year" name="trans_year" required min="2000" max="2100">

            <label for="trans_amount">Transaction Amount (INR):</label>
            <input type="number" id="trans_amount" name="trans_amount" required step="0.01">

            <label for="upi_number">UPI Number / ID:</label>
            <input type="text" id="upi_number" name="upi_number" required>

            <button type="submit">Predict Fraud Risk</button>
        </form>

        {% if result %}
            <div class="result {% if result == 'Fraud' %}fraud{% else %}safe{% endif %}">
                Prediction: {{ result }}
            </div>
        {% endif %}
    </div>
</body>
</html>
